name: CI Standard
on:
  push:
    branches: [main]
    paths-ignore:
      - "LICENSE"
      - ".gitignore"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - "LICENSE"
      - ".gitignore"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pick-runner:
    runs-on: d-sorg-fleet
    timeout-minutes: 2
    outputs:
      runner: ${{ steps.check.outputs.runner }}
    steps:
      - name: Check for self-hosted runner
        id: check
        env:
          GH_TOKEN: ${{ secrets.RUNNER_CHECK_TOKEN }}
        run: "ONLINE=$(gh api /orgs/${{ github.repository_owner }}/actions/runners \\\n  --jq '[.runners[] | select(.status == \"online\") | select(.labels[].name == \"d-sorg-fleet\")] | length' \\\n  2>/dev/null || echo \"0\")\nif [[ \"$ONLINE\" -gt 0 ]]; then\n  echo \"runner=d-sorg-fleet\" >> $GITHUB_OUTPUT\n  echo \"Self-hosted runner online — routing locally\"\nelse\n  echo \"runner=ubuntu-latest\" >> $GITHUB_OUTPUT\n  echo \"No self-hosted runner — using GitHub-hosted\"\nfi"
  quality-gate:
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python venv
        run: |
          for PYTHON in python3.11 python3.12 python3.10 python3; do
            if command -v "$PYTHON" &>/dev/null; then
              echo "Using $PYTHON ($($PYTHON --version))"
              "$PYTHON" -m venv "$RUNNER_TEMP/ci-venv"
              "$RUNNER_TEMP/ci-venv/bin/pip" install --upgrade pip setuptools wheel --quiet
              echo "$RUNNER_TEMP/ci-venv/bin" >> $GITHUB_PATH
              exit 0
            fi
          done
          echo "No Python3 found on PATH" && exit 1
      - run: pip install ruff==0.14.10 mypy==1.13.0 bandit==1.7.7

      - name: Lint
        run: ruff check src scripts tests

      - name: Check Formatting (ruff)
        run: ruff format --check src scripts tests

      - run: pip install mypy types-PyYAML types-requests
      - run: pip install -e .[dev]
      - run: mypy src --config-file pyproject.toml

      - name: Verify No Placeholders
        run: |
          violations=$(
            find . \( -path "./.git" -o -path "./.mypy_cache" -o -path "./.ruff_cache" -o -path "./__pycache__" -o -path "./scripts" \) -prune -o -type f -name "*.py" -print0 \
              | xargs -0 grep -nE "TODO|FIXME" || true
          )
          if [ -n "$violations" ]; then
            echo "$violations"
            echo "::error::Placeholders found. Remove TODOs/FIXMEs or create tracked GitHub issues."
            exit 1
          fi

      - name: Security Audit
        run: |
          pip install pip-audit
          pip install --upgrade pygments
          # CVE exceptions with expiration dates.
          # Each entry must have: (1) CVE ID, (2) reason, (3) expiration, (4) tracking issue.
          # See .github/cve-exceptions.md for full details.
          # - CVE-2026-4539: pygments upstream fix pending (expires 2026-05-31, #173-1)
          # - CVE-2026-32274: transitive dev-dependency, not exploitable in prod (expires 2026-05-31, #173-2)
          # - CVE-2026-21883: dev-only dependency (expires 2026-05-31, #173-3)
          # - CVE-2026-27205: waiting for upstream release (expires 2026-06-15, #173-4)
          # - CVE-2024-47081: dev-only, no runtime impact (expires 2026-05-31, #173-5)
          # - CVE-2026-3219: upstream fix in progress (expires 2026-06-15, #173-6)
          # - CVE-2026-25645: transitive dependency, monitor for patch (expires 2026-06-15, #173-7)
          pip-audit --skip-editable \
            --ignore-vuln CVE-2026-4539 \
            --ignore-vuln CVE-2026-32274 \
            --ignore-vuln CVE-2026-21883 \
            --ignore-vuln CVE-2026-27205 \
            --ignore-vuln CVE-2024-47081 \
            --ignore-vuln CVE-2026-3219 \
            --ignore-vuln CVE-2026-25645

      - name: Bandit Security Scan
        run: |
          bandit -r src/ -ll -ii --format txt

      - name: Generate SBOM
        run: |
          pip install cyclonedx-bom
          cyclonedx-py environment -o sbom.json --output-format JSON

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

    needs: pick-runner
  rust:
    needs:
      - pick-runner
      - quality-gate
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust_core
      - name: Run Rust tests
        run: |
          cd rust_core
          cargo test --verbose
      - name: Build Rust extension
        run: |
          cd rust_core
          cargo build --verbose --release
      - name: Upload Rust artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-core-${{ github.sha }}
          path: rust_core/target/release/libmujoco_models_core.so
          if-no-files-found: warn

  tests:
    needs:
      - pick-runner
      - quality-gate
      - rust
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    timeout-minutes: 15
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python venv
        run: |
          PYTHON="python${{ matrix.python }}"
          if ! command -v "$PYTHON" &>/dev/null; then
            echo "WARNING: $PYTHON not found, falling back to python3"
            PYTHON=python3
          fi
          echo "Using $PYTHON ($($PYTHON --version))"
          "$PYTHON" -m venv "$RUNNER_TEMP/ci-venv"
          "$RUNNER_TEMP/ci-venv/bin/pip" install --upgrade pip setuptools wheel --quiet
          echo "$RUNNER_TEMP/ci-venv/bin" >> $GITHUB_PATH

      - name: Install Dependencies
        run: pip install -e ".[dev]"

      - name: Verify package is importable without PYTHONPATH
        run: |
          python3 -m mujoco_models --help >/dev/null 2>&1 || {
            echo "::error::Package not importable after pip install. Check pyproject.toml build config."
            exit 1
          }

      - name: Run Test Suite
        run: |
          python3 -m pytest \
            -n auto \
            --timeout=60 \
            --timeout-method=thread \
            -m "not slow and not requires_mujoco and not benchmark" \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-config=pyproject.toml \
            --cov-fail-under=80 \
            --tb=short \
            -v

      - name: Run Benchmarks
        run: |
          python3 -m pytest \
            -o addopts="-ra -q --strict-markers --strict-config --durations=20" \
            -m "benchmark" \
            --timeout=120 \
            --timeout-method=thread \
            --benchmark-only \
            --benchmark-json=benchmark-results.json \
            --tb=short \
            -v

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-py${{ matrix.python }}
          path: benchmark-results.json
