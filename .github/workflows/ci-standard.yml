      shell: bash
      env:
        GH_TOKEN: ${{ secrets.RUNNER_CHECK_TOKEN || secrets.GITHUB_TOKEN }}
        RUNNER_OWNER: D-sorganization
        RUNNER_LABEL: d-sorg-fleet
